<html lang="en">
<head>
<meta charset="utf-8">

<link rel="icon" type="image/png" href="favicon-32.png" sizes="32x32">

  html,body{margin:0;padding:0;background:#f9f9f7;overscroll-behavior:none}
  @media (prefers-color-scheme:dark){html,body{background:#0b0d12}}
</style>

<body>
<style>
  :root{
    --bg:#f9f9f7; --surface:#ffffff; --surface-2:#efeeea; --ink:#1a1a1c; --ink-2:#5b5c63; --ink-3:#8d8e96; --line:#e6e5e0;
    --blue:#2f49e6; --blue-ink:#1c2ca0; --blue-bg:#e9ecfd;
    --heat:#d0522c; --heat-ink:#8c3418; --heat-bg:#fbeae2;
    --rest:#6f7480; --rest-ink:#43474f; --rest-bg:#edece7;
    --rec:#1f8a68; --rec-ink:#1a5c47; --rec-bg:#e1f2eb;
    --warn-ink:#8a6212; --warn-bg:#f8eecd; --warn-line:#ecd9a3;
    --radius:14px; --shadow:0 1px 2px rgba(20,20,30,.05),0 4px 14px rgba(20,20,30,.06);
    --sans:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --ease:cubic-bezier(.32,.72,0,1);
  }
  @media (prefers-color-scheme:dark){
    :root{
      --bg:#0b0d12; --surface:#14161e; --surface-2:#1a1d27; --ink:#eef0f5; --ink-2:#a3a8b6; --ink-3:#6d7280; --line:#272b36;
      --blue:#8194ff; --blue-ink:#c8d0ff; --blue-bg:#1b2140;
      --heat:#f0855f; --heat-ink:#f6c4ae; --heat-bg:#38200f;
      --rest:#8b91a1; --rest-ink:#c2c6d0; --rest-bg:#20232d;
      --rec:#4cc199; --rec-ink:#bfe8da; --rec-bg:#0f2c23;
      --warn-ink:#e8c979; --warn-bg:#2f2712; --warn-line:#4a3d18;
      --shadow:0 1px 2px rgba(0,0,0,.3),0 6px 20px rgba(0,0,0,.35);
    }
  }
  :root[data-theme="light"]{
    --bg:#f9f9f7; --surface:#ffffff; --surface-2:#efeeea; --ink:#1a1a1c; --ink-2:#5b5c63; --ink-3:#8d8e96; --line:#e6e5e0;
    --blue:#2f49e6; --blue-ink:#1c2ca0; --blue-bg:#e9ecfd;
    --heat:#d0522c; --heat-ink:#8c3418; --heat-bg:#fbeae2;
    --rest:#6f7480; --rest-ink:#43474f; --rest-bg:#edece7;
    --rec:#1f8a68; --rec-ink:#1a5c47; --rec-bg:#e1f2eb;
    --warn-ink:#8a6212; --warn-bg:#f8eecd; --warn-line:#ecd9a3;
    --shadow:0 1px 2px rgba(20,20,30,.05),0 4px 14px rgba(20,20,30,.06);
  }
  :root[data-theme="dark"]{
    --bg:#0b0d12; --surface:#14161e; --surface-2:#1a1d27; --ink:#eef0f5; --ink-2:#a3a8b6; --ink-3:#6d7280; --line:#272b36;
    --blue:#8194ff; --blue-ink:#c8d0ff; --blue-bg:#1b2140;
    --heat:#f0855f; --heat-ink:#f6c4ae; --heat-bg:#38200f;
    --rest:#8b91a1; --rest-ink:#c2c6d0; --rest-bg:#20232d;
    --rec:#4cc199; --rec-ink:#bfe8da; --rec-bg:#0f2c23;
    --warn-ink:#e8c979; --warn-bg:#2f2712; --warn-line:#4a3d18;
    --shadow:0 1px 2px rgba(0,0,0,.3),0 6px 20px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  #bl{position:fixed;top:0;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;overflow:hidden;
    background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.5;-webkit-font-smoothing:antialiased;
    -webkit-text-size-adjust:100%;-webkit-user-select:none;user-select:none}
  #bl button,#bl a{touch-action:manipulation;font-family:inherit}
  #bl .num{font-variant-numeric:tabular-nums}
  #bl svg{display:block}
  #bl .t-strength{--c:var(--blue);--c-ink:var(--blue-ink);--c-bg:var(--blue-bg)}
  #bl .t-cond{--c:var(--heat);--c-ink:var(--heat-ink);--c-bg:var(--heat-bg)}
  #bl .t-rec{--c:var(--rec);--c-ink:var(--rec-ink);--c-bg:var(--rec-bg)}
  #bl .t-rest{--c:var(--rest);--c-ink:var(--rest-ink);--c-bg:var(--rest-bg)}
  #stack{position:absolute;inset:0}
  #bl .scrim{position:absolute;inset:0;background:#000;opacity:0;pointer-events:none;transition:opacity .34s var(--ease)}
  #bl .page{position:absolute;inset:0;display:flex;flex-direction:column;background:var(--bg);
    transition:transform .34s var(--ease);will-change:transform;box-shadow:-1px 0 0 var(--line)}
  #bl .dragging{transition:none!important}
  #bl .edge{position:absolute;left:0;top:0;bottom:0;width:24px;z-index:5;touch-action:none}
  #bl .navbar{flex:0 0 auto;position:relative;z-index:3;display:flex;align-items:center;gap:8px;
    padding:max(11px,env(safe-area-inset-top)) 14px 11px;min-height:52px;border-bottom:1px solid var(--line);
    background:color-mix(in srgb,var(--bg) 82%,transparent);backdrop-filter:saturate(1.7) blur(16px);-webkit-backdrop-filter:saturate(1.7) blur(16px)}
  #bl .sched-nav{border-bottom-color:transparent}
  #bl .sched-nav.solid{border-bottom-color:var(--line)}
  #bl .navtitle-sm{flex:1;text-align:center;font-size:16px;font-weight:600;letter-spacing:-.2px;opacity:0;transition:opacity .2s ease}
  #bl .sched-nav.solid .navtitle-sm{opacity:1}
  #bl .backbtn{border:none;background:none;color:var(--blue);display:flex;align-items:center;gap:1px;cursor:pointer;
    font-size:16px;font-weight:400;padding:6px 8px 6px 0;flex:0 0 auto}
  #bl .backbtn:active{opacity:.4}
  #bl .navtitle{flex:1;text-align:center;font-size:16px;font-weight:600;letter-spacing:-.2px;line-height:1.15;padding-right:52px}
  #bl .navtitle small{display:block;font-size:11.5px;font-weight:400;color:var(--ink-3);margin-top:1px}
  #bl .scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
  #bl .view{padding:6px 18px calc(28px + env(safe-area-inset-bottom))}
  #bl .homehdr{padding:12px 0 12px}
  #bl .apptitle{font-size:34px;font-weight:700;letter-spacing:-1px;margin:0}
  #bl .aboutlink{margin-top:9px;display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);background:var(--surface);
    color:var(--ink-2);border-radius:999px;padding:7px 11px;font-size:13px;font-weight:500;cursor:pointer;box-shadow:var(--shadow)}
  #bl .aboutlink:active{background:var(--surface-2)}
  #bl .aboutlink .ilead{color:var(--blue);display:flex}
  #bl .aboutlink .itrail{color:var(--ink-3);display:flex}
  #bl .weekwrap{display:flex;gap:8px;overflow-x:auto;padding:2px 0 14px;scrollbar-width:none}
  #bl .weekwrap::-webkit-scrollbar{display:none}
  #bl .weekpill{flex:0 0 auto;border:1px solid var(--line);background:var(--surface);color:var(--ink-2);
    border-radius:11px;padding:9px 14px;font-size:13px;font-weight:600;cursor:pointer;text-align:center;line-height:1.2}
  #bl .weekpill small{display:block;font-size:10.5px;font-weight:500;color:var(--ink-3);margin-top:2px}
  #bl .weekpill[aria-selected="true"]{background:var(--ink);color:var(--bg);border-color:var(--ink)}
  #bl .weekpill[aria-selected="true"] small{color:var(--bg);opacity:.7}
  #bl .days{display:flex;flex-direction:column;gap:11px}
  #bl .day{position:relative;display:flex;align-items:center;gap:13px;background:var(--surface);border:1px solid var(--line);
    border-radius:var(--radius);padding:15px 14px 15px 16px;cursor:pointer;box-shadow:var(--shadow);
    text-align:left;width:100%;color:inherit;transition:background .12s}
  #bl .day:active{background:var(--surface-2)}
  #bl .day::before{content:"";position:absolute;left:0;top:12px;bottom:12px;width:4px;border-radius:0 4px 4px 0;background:var(--c,var(--rest))}
  #bl .daydate{flex:0 0 42px;text-align:center}
  #bl .daydate .dow{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--c-ink,var(--ink-2))}
  #bl .daydate .dnum{font-size:22px;font-weight:700;letter-spacing:-.5px;line-height:1.05}
  #bl .daymid{flex:1 1 auto;min-width:0}
  #bl .daytitle{font-size:16px;font-weight:600;letter-spacing:-.2px}
  #bl .daysub{font-size:13px;color:var(--ink-2);margin-top:1px}
  #bl .dayright{flex:0 0 auto;display:flex;flex-direction:column;align-items:flex-end;gap:6px}
  #bl .chev{color:var(--ink-3);display:flex}
  #bl .tag{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;
    padding:4px 8px;border-radius:7px;background:var(--c-bg,var(--rest-bg));color:var(--c-ink,var(--rest-ink));white-space:nowrap}
  #bl .todaychip{font-size:9.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:3px 7px;border-radius:6px;background:var(--ink);color:var(--bg)}
  #bl .day.rest{background:var(--surface-2);box-shadow:none;border-color:transparent}
  #bl .day.rest .daytitle{color:var(--ink-2)}
  #bl .startcard{background:var(--surface);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);margin-bottom:12px;overflow:hidden}
  #bl .srow{display:flex;gap:11px;padding:12px 13px}
  #bl .srow + .srow{border-top:1px solid var(--line)}
  #bl .sicon{flex:0 0 auto;color:var(--c-ink,var(--ink));margin-top:1px}
  #bl .scol{min-width:0}
  #bl .slabel{font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-3)}
  #bl .sval{font-size:14px;font-weight:600;color:var(--ink);margin-top:3px;line-height:1.35}
  #bl .sval em{font-style:normal;font-weight:500;color:var(--ink-2)}
  #bl .snote{font-size:12px;color:var(--ink-2);line-height:1.5;margin-top:4px}
  #bl .focus{display:flex;gap:11px;background:var(--c-bg,var(--rest-bg));border-radius:var(--radius);padding:14px 15px;margin-bottom:14px}
  #bl .focus .fic{flex:0 0 auto;color:var(--c-ink)}
  #bl .focus p{margin:0;font-size:14px;color:var(--c-ink,var(--ink));line-height:1.55}
  #bl .reentry,#bl .safety{display:flex;gap:11px;align-items:flex-start;border-radius:12px;padding:12px 13px;margin-bottom:14px}
  #bl .reentry{background:var(--blue-bg)}
  #bl .reentry .ric{flex:0 0 auto;color:var(--blue-ink);margin-top:1px}
  #bl .reentry p{margin:0;font-size:12.5px;color:var(--blue-ink);line-height:1.5}
  #bl .safety{background:var(--warn-bg);border:1px solid var(--warn-line);margin-bottom:20px}
  #bl .safety .shd{flex:0 0 auto;color:var(--warn-ink);margin-top:1px}
  #bl .safety p{margin:0;font-size:12.5px;color:var(--warn-ink);line-height:1.5}
  #bl .reentry b,#bl .safety b{font-weight:700;letter-spacing:.04em;text-transform:uppercase;font-size:11px}
  #bl .sec{margin-bottom:22px}
  #bl .seclabel{display:flex;align-items:center;gap:8px;margin:0 2px 6px}
  #bl .seclabel .sic{color:var(--c-ink,var(--ink))}
  #bl .seclabel b{font-size:12.5px;font-weight:700;letter-spacing:.11em;text-transform:uppercase;color:var(--ink)}
  #bl .secmeta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:0 2px 12px;font-size:12px;color:var(--ink-2);font-weight:500}
  #bl .struct{display:inline-flex;align-items:center;gap:5px;background:var(--c-bg,var(--rest-bg));color:var(--c-ink,var(--rest-ink));
    padding:4px 9px;border-radius:7px;font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
  #bl .ex{display:flex;gap:12px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:14px 15px;margin-bottom:10px;box-shadow:var(--shadow)}
  #bl .slot{flex:0 0 auto;width:36px;height:36px;border-radius:50%;background:var(--c-bg,var(--rest-bg));border:1.5px solid var(--c,var(--rest));
    color:var(--c-ink,var(--ink));font-size:12.5px;font-weight:700;display:flex;align-items:center;justify-content:center}
  #bl .exbody{flex:1 1 auto;min-width:0}
  #bl .exhead{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
  #bl .exname{font-size:15.5px;font-weight:600;letter-spacing:-.2px;line-height:1.25}
  #bl .exrx{flex:0 0 auto;font-size:14px;font-weight:700;color:var(--c-ink,var(--ink));text-align:right;line-height:1.3;max-width:46%}
  #bl .exsetup{display:inline-flex;align-items:center;gap:6px;margin-top:7px;font-size:11.5px;font-weight:600;color:var(--ink-2);
    background:var(--surface-2);border-radius:7px;padding:4px 9px}
  #bl .exsetup .si{color:var(--ink-3);display:flex}
  #bl .exdesc{font-size:13px;color:var(--ink-2);line-height:1.55;margin:9px 0 0}
  #bl .exbtns{display:flex;gap:8px;margin-top:11px;flex-wrap:wrap}
  #bl .btn{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:600;color:var(--ink-2);text-decoration:none;
    border:1px solid var(--line);border-radius:9px;padding:7px 11px;background:var(--surface-2);cursor:pointer}
  #bl .btn:active{opacity:.6}
  #bl .btn .pl{display:inline-flex;align-items:center;justify-content:center;width:17px;height:17px;border-radius:4px;background:#ff0000;color:#fff}
  #bl .btn.on{background:var(--c-bg);color:var(--c-ink);border-color:transparent}
  #bl .swaptag{display:inline-flex;align-items:center;gap:5px;margin-top:8px;font-size:10.5px;font-weight:700;letter-spacing:.04em;
    text-transform:uppercase;background:var(--c-bg);color:var(--c-ink);border-radius:6px;padding:3px 8px}
  #bl .setnote{font-size:12.5px;color:var(--ink-2);line-height:1.5;margin:10px 0 0}
  #bl .setnote b{color:var(--ink);font-weight:700}
  #bl .chips{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-top:12px}
  #bl .chip{background:var(--c-bg);border-radius:9px;padding:7px 2px;text-align:center}
  #bl .chip .r{font-size:15px;font-weight:700;color:var(--c-ink);line-height:1}
  #bl .chip .p{font-size:9.5px;font-weight:600;color:var(--c-ink);opacity:.72;margin-top:3px}
  #bl .chip .lbl{font-size:8px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--c-ink);opacity:.55;margin-top:3px}
  #bl .ab h2{font-size:20px;font-weight:700;letter-spacing:-.4px;margin:24px 0 8px}
  #bl .ab h2:first-child{margin-top:6px}
  #bl .ab p{font-size:14px;color:var(--ink-2);line-height:1.65;margin:0 0 12px}
  #bl .ab .lead{font-size:15px;color:var(--ink)}
  #bl .ab b{color:var(--ink);font-weight:600}
  #bl .ab .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px 17px;margin-bottom:14px;box-shadow:var(--shadow)}
  #bl .ab ul{margin:0;padding-left:0;list-style:none;display:flex;flex-direction:column;gap:11px}
  #bl .ab li{font-size:13.5px;color:var(--ink-2);line-height:1.55;padding-left:22px;position:relative}
  #bl .ab li::before{content:"";position:absolute;left:2px;top:7px;width:7px;height:7px;border-radius:50%;background:var(--blue)}
  #bl .ab .rule li::before{background:var(--warn-ink)}
  #bl .legend{display:flex;flex-wrap:wrap;gap:10px 14px;margin:2px 0 6px}
  #bl .lg{display:flex;align-items:center;gap:7px;font-size:12.5px;font-weight:500;color:var(--ink-2)}
  #bl .lg .lgi{display:flex}
</style>

<div id="bl">
  <div id="stack">
    <div class="page" id="rootpage"></div>
    <div class="scrim" id="scrim"></div>
  </div>
</div>

<script>
(function(){
  var BASE=new Date(2026,6,13);
  var WEEKS=["Jul 13–19","Jul 20–26","Jul 27–Aug 2","Aug 3–9"];
  var DOW=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
  var P={
    info:'<circle cx="12" cy="12" r="9"/><path d="M12 11v5M12 8h.01"/>',
    dumbbell:'<path d="M6 8v8M18 8v8M3 10v4M21 10v4M6 12h12"/>',
    pulse:'<path d="M3 12h4l3 8 4-16 3 8h4"/>',
    leaf:'<path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.5 19 2c1 2 2 4.2 2 8 0 5.5-4.8 10-10 10Z"/><path d="M2 22 17 7"/>',
    moon:'<path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8Z"/>',
    zap:'<path d="M13 2 4 14h8l-1 8 9-12h-8l1-8Z"/>',
    layers:'<path d="M12 2 2 7l10 5 10-5-10-5Z"/><path d="M2 12l10 5 10-5M2 17l10 5 10-5"/>',
    flame:'<path d="M12 2c3 4 5 6 5 9a5 5 0 0 1-10 0c0-1.6.8-3 2-4 .3 1.2 1.2 2 2.5 2C10.4 8 11 5 12 2Z"/>',
    hex:'<path d="M12 2l9 5v10l-9 5-9-5V7Z"/>',
    chevR:'<path d="M9 6l6 6-6 6"/>',
    chevL:'<path d="M15 6l-6 6 6 6"/>',
    shield:'<path d="M12 2 4 5v6c0 5 3.5 8 8 10 4.5-2 8-5 8-10V5Z"/>',
    rows:'<path d="M4 6h16M4 12h16M4 18h16"/>',
    circuit:'<path d="M17 2l4 4-4 4M3 11V9a4 4 0 0 1 4-4h14M7 22l-4-4 4-4M21 13v2a4 4 0 0 1-4 4H3"/>',
    play:'<path d="M8 5v14l11-7Z"/>',
    clock:'<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>',
    swap:'<path d="M16 3l4 4-4 4M20 7H5"/><path d="M8 21l-4-4 4-4M4 17h15"/>',
    gauge:'<path d="M12 14a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z"/><path d="M13.4 10.6 19 5"/><path d="M4 20a9 9 0 1 1 16 0"/>',
    watch:'<rect x="6" y="6" width="12" height="12" rx="3"/><path d="M9 6V3h6v3M9 18v3h6v-3"/><path d="M12 10v2.3l1.6 1"/>',
    pin:'<path d="M12 21s7-5.7 7-11a7 7 0 1 0-14 0c0 5.3 7 11 7 11Z"/><circle cx="12" cy="10" r="2.5"/>'
  };
  function ico(n,s,fill){s=s||18;var f=fill?'currentColor':'none';var sw=fill?'0':'2';
    return '<svg viewBox="0 0 24 24" width="'+s+'" height="'+s+'" fill="'+f+'" stroke="currentColor" stroke-width="'+sw+'" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">'+P[n]+'</svg>';}
  function yt(q){return "https://www.youtube.com/results?search_query="+encodeURIComponent(q);}
  function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
  function setsN(){return week===0?2:3;}

  var SWAP={}; try{ SWAP=JSON.parse(localStorage.getItem("tr_swap")||"{}"); }catch(e){ SWAP={}; }
  function saveSwap(){ try{ localStorage.setItem("tr_swap",JSON.stringify(SWAP)); }catch(e){} }

  var SIX={
    w:[
      [[10,20],[8,45],[6,50],[6,55],[6,55],[6,60]],
      [[10,20],[8,50],[6,55],[6,60],[6,65],[6,70]],
      [[10,20],[8,50],[6,60],[6,65],[6,70],[6,72.5]],
      [[10,20],[8,50],[6,60],[6,65],[6,72.5],[6,75]]
    ],
    note:"Warm up with 1–2 lighter sets first (they don't count). The last two work sets are the money sets — hard, but always leave clean reps in the tank. Never grind a max: grinding makes you clench and brace, and that pulls on the shoulder."
  };
  function e(n,q,d,p,setup,alt){return {name:n,q:q,d:d,p:p,setup:setup,alt:alt};}

  // bodyweight fallbacks for when a machine is occupied

      '<div class="card"><p style="margin:0 0 10px;color:var(--ink);font-weight:600;font-size:14px">The one rule this whole program is built around</p><p style="margin:0">Your surgeon said protect the shoulder — no loading. So the right arm does <b>nothing</b>: no weights, no hard grip, no bracing, nothing overhead or behind the body. Every lift here is chosen so your legs and hips work hard while that shoulder stays completely out of it.</p></div>'+
      '<div class="card"><p style="margin:0 0 8px;color:var(--ink);font-weight:600;font-size:14px">Matched to your gym — one floor per workout</p><p style="margin:0">Only machines your gym actually has, and each workout stays on a single floor so you\'re not running up and down stairs. <b>Lower A and Lower C are on the 4th floor</b> (leg press, leg curl, leg extension); <b>Lower B is on the 3rd floor</b> (glute drive, hamstring roller, angled leg press); cardio days are any floor. Each day\'s page tells you where to go.</p></div>'+
      '<div class="card"><p style="margin:0 0 8px;color:var(--ink);font-weight:600;font-size:14px">No supersets on machines</p><p style="margin:0">Accessories are <b>straight sets</b> — do all your sets on one machine, then move to the next. No jumping between machines and losing them to someone else. The only circuit is the bodyweight warm-up.</p></div>'+
      '<div class="card"><p style="margin:0 0 8px;color:var(--ink);font-weight:600;font-size:14px">Machine taken? Swap it.</p><p style="margin:0">If a machine\'s in use, tap <b>Swap</b> for a shoulder-safe bodyweight version that trains the same muscle. Your choice is remembered.</p></div>'+
      '<h2>The week at a glance</h2>'+
      '<div class="legend">'+
        '<span class="lg"><span class="lgi" style="color:var(--blue)">'+ico("dumbbell",17)+'</span>Strength</span>'+
        '<span class="lg"><span class="lgi" style="color:var(--heat)">'+ico("pulse",17)+'</span>Conditioning</span>'+
        '<span class="lg"><span class="lgi" style="color:var(--rec)">'+ico("leaf",17)+'</span>Recovery</span>'+
        '<span class="lg"><span class="lgi" style="color:var(--rest)">'+ico("moon",17)+'</span>Rest</span></div>'+
      '<ul><li><b>Mon · Wed · Fri</b> — the three leg days (quad, glutes, then a lighter pump day). Each ends with a Zone 2 walk.</li>'+
        '<li><b>Tue · Thu</b> — conditioning (easy Zone 2, then intervals + a steady walk).</li>'+
        '<li><b>Sat</b> — full rest. <b>Sun</b> — active recovery and mobility.</li></ul>'+
      '<h2>How to read a day</h2>'+
      '<p>Each page opens with your Apple Watch workout type and which floor to start on. Below that, exercises are lettered like the Fort:</p>'+
      '<div class="legend"><span class="lg"><span class="lgi" style="color:var(--blue)">'+ico("circuit",17)+'</span><b style="color:var(--ink);font-weight:600">Circuit</b> — the bodyweight warm-up: A1 → A2 → A3 once through, no rest</span></div>'+
      '<div class="legend"><span class="lg"><span class="lgi" style="color:var(--blue)">'+ico("rows",17)+'</span><b style="color:var(--ink);font-weight:600">Straight sets</b> — everything else: finish all sets of one move (resting between) before the next</span></div>'+
      '<p>Every number is exact — sets, reps, rest, machine setup, treadmill incline and speed, bike cadence, and lifting tempo.</p>'+
      '<h2>Sets and how it progresses</h2>'+
      '<p>Accessories are a steady <b>2–3 sets</b>: 2 in the light re-entry week, 3 from Week 2 on. The main lift (Leg Press on Monday, Glute Drive on Wednesday) is the exception — it runs the fuller <b>"Six the Hard Way"</b>: six sets of 10, 8, 6, 6, 6, 6 at rising weight, resting 2 minutes between. Same movements every week; you just add a little weight as they get easier.</p>'+
      '<div class="card rule"><p style="margin:0 0 10px;color:var(--warn-ink);font-weight:700;font-size:12px;letter-spacing:.06em;text-transform:uppercase">Safety rules — every session</p><ul class="rule">'+
        '<li>Right arm does nothing — no weight, grip, or bracing through it.</li>'+
        '<li>Leave clean reps in reserve. No max grinds (grinding = clenching = shoulder strain).</li>'+
        '<li>No fall risk — a rail within reach for any single-leg work.</li>'+
        '<li>Nothing overhead, behind the body, or hanging.</li>'+
        '<li>Pain, tingle, or instability in the shoulder → stop that movement.</li></ul></div>'+
      '<h2>Fuel it</h2><ul>'+
        '<li><b>180 g protein a day</b> to hold muscle into the layoff.</li>'+
        '<li>Keep your <b>cut calories</b> where they are — the leg volume plus the walk finishers keep your burn high.</li>'+
        '<li><b>Creatine</b> stays in. <b>Alcohol</b> near zero heading into surgery.</li></ul>'+
      '<p style="font-size:12.5px;color:var(--ink-3);margin-top:16px">This block runs until your surgery date. Confirm with your surgical team that training legs on machines and doing leg-only cardio is fine with the shoulder fully unloaded.</p></div>';
  }

  function renderRoot(){
    rootpage.innerHTML='<div class="navbar sched-nav" id="schednav"><div class="navtitle-sm">Training</div></div>'+
      '<div class="scroll" id="rootscroll">'+scheduleHTML()+'</div>';
    var sn=document.getElementById("schednav"),rs=document.getElementById("rootscroll");
    rs.addEventListener("scroll",function(){ if(rs.scrollTop>34)sn.classList.add("solid"); else sn.classList.remove("solid"); saveNavSoon(); });
    document.getElementById("aboutlink").onclick=function(){openDetail("about");};
    wireDays();
    document.querySelectorAll("#weekwrap .weekpill").forEach(function(p){p.onclick=function(){
      week=+p.dataset.w;
      document.querySelectorAll("#weekwrap .weekpill").forEach(function(q){q.setAttribute("aria-selected",+q.dataset.w===week);});
      document.getElementById("dayslist").innerHTML=daysListHTML(week); wireDays(); saveNav();
    };});
  }
  function wireDays(){
    document.querySelectorAll("#dayslist .day").forEach(function(cd){cd.onclick=function(){openDetail("day",+cd.dataset.d);};});
  }
  function wireSwaps(pg){
    pg.querySelectorAll("[data-swap]").forEach(function(b){b.onclick=function(){
      var k=b.dataset.swap; if(SWAP[k])delete SWAP[k]; else SWAP[k]=1; saveSwap();
      var sc=pg.querySelector(".scroll"), y=sc.scrollTop;
      sc.innerHTML=dayHTML(week,curDay); wireSwaps(pg); sc.scrollTop=y;
    };});
    var sc=pg.querySelector(".scroll"); if(sc)sc.addEventListener("scroll",saveNavSoon);
  }

  var detail=null, dragging=false, startX=0, W=0;
  function makeDetail(kind,i){
    var title, body;
    if(kind==="day"){ var day=dayData(week,i),dt=dateFor(week,i);
      title=esc(DOW[i])+' · '+esc(day.title)+'<small>Week '+(week+1)+' · '+esc(dt.toLocaleDateString(undefined,{month:"short",day:"numeric"}))+(day.est?' · '+day.est:'')+'</small>';
      body=dayHTML(week,i);
    } else { title="About"; body=aboutHTML(); }
    var pg=document.createElement("div"); pg.className="page";
    pg.innerHTML='<div class="navbar"><button class="backbtn">'+ico("chevL",22)+'Back</button><div class="navtitle">'+title+'</div></div>'+
      '<div class="scroll">'+body+'</div><div class="edge"></div>';
    pg.querySelector(".backbtn").onclick=function(){closeDetail();};
    if(kind==="day")wireSwaps(pg);
    else { var sc=pg.querySelector(".scroll"); if(sc)sc.addEventListener("scroll",saveNavSoon); }
    attachSwipe(pg.querySelector(".edge"));
    return pg;
  }
  function openDetail(kind,i,instant){
    if(detail)return;
    curKind=kind; curDay=(kind==="day")?i:null;
    detail=makeDetail(kind,i);
    if(instant){
      detail.style.transition="none"; detail.style.transform="translateX(0)";
      rootpage.style.transition="none"; rootpage.style.transform="translateX(-24%)";
      scrim.style.transition="none"; scrim.style.opacity=".12";
      stack.appendChild(detail); detail.offsetWidth;
      detail.style.transition=""; rootpage.style.transition=""; scrim.style.transition="";
    } else {
      detail.style.transform="translateX(100%)"; detail.style.transition="none";
      stack.appendChild(detail); detail.offsetWidth;
      detail.style.transition=""; detail.style.transform="translateX(0)";
      rootpage.style.transform="translateX(-24%)"; scrim.style.opacity=".12";
    }
    saveNav();
  }
  function closeDetail(){
    if(!detail)return;
    var d=detail; detail=null; curKind="schedule"; curDay=null;
    d.style.transform="translateX(100%)"; rootpage.style.transform=""; scrim.style.opacity="0";
    var done=function(){ if(d.parentNode)d.parentNode.removeChild(d); };
    d.addEventListener("transitionend",done); setTimeout(done,420);
    saveNav();
  }
  function setProg(px){
    var p=Math.max(0,Math.min(1,px/W));
    detail.style.transform="translateX("+Math.max(0,px)+"px)";
    rootpage.style.transform="translateX("+(-24*(1-p))+"%)";
    scrim.style.opacity=(0.12*(1-p)).toFixed(3);
  }
  function attachSwipe(edge){
    edge.addEventListener("pointerdown",function(ev){
      if(!detail)return; dragging=true; startX=ev.clientX; W=bl.clientWidth;
      try{edge.setPointerCapture(ev.pointerId);}catch(e){}
      detail.classList.add("dragging"); rootpage.classList.add("dragging"); scrim.classList.add("dragging");
    });
    edge.addEventListener("pointermove",function(ev){ if(dragging&&detail)setProg(ev.clientX-startX); });
    var end=function(ev){
      if(!dragging)return; dragging=false;
      if(detail)detail.classList.remove("dragging");
      rootpage.classList.remove("dragging"); scrim.classList.remove("dragging");
      var dx=ev.clientX-startX;
      if(detail&&dx>W*0.35)closeDetail();
      else if(detail){ detail.style.transform="translateX(0)"; rootpage.style.transform="translateX(-24%)"; scrim.style.opacity=".12"; }
    };
    edge.addEventListener("pointerup",end); edge.addEventListener("pointercancel",end);
  }

  renderRoot();
  setTimeout(function(){
    var rsEl=document.getElementById("rootscroll"); if(savedNav && savedNav.rs && rsEl) rsEl.scrollTop=savedNav.rs;
    if(savedNav && savedNav.v==="day" && savedNav.day!=null && DAYS[savedNav.day]) openDetail("day",savedNav.day,true);
    else if(savedNav && savedNav.v==="about") openDetail("about",null,true);
    if(detail && savedNav && savedNav.ds){ var s=detail.querySelector(".scroll"); if(s)s.scrollTop=savedNav.ds; }
  },40);
  window.addEventListener("pagehide",saveNav);
  document.addEventListener("visibilitychange",function(){ if(document.visibilityState==="hidden")saveNav(); });
})();
</script>

</body>
</html>
