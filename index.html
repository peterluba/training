<style>
  :root{
    --bg:#f9f9f7; --surface:#ffffff; --surface-2:#efeeea; --ink:#1a1a1c; --ink-2:#5b5c63; --ink-3:#8d8e96; --line:#e6e5e0;
    --blue:#2f49e6; --blue-ink:#1c2ca0; --blue-bg:#e9ecfd;
    --heat:#d0522c; --heat-ink:#8c3418; --heat-bg:#fbeae2;
    --rest:#6f7480; --rest-ink:#43474f; --rest-bg:#edece7;
    --rec:#1f8a68; --rec-ink:#1a5c47; --rec-bg:#e1f2eb;
    --warn-ink:#8a6212; --warn-bg:#f8eecd; --warn-line:#ecd9a3;
    --radius:14px; --shadow:0 1px 2px rgba(20,20,30,.05),0 4px 14px rgba(20,20,30,.06);
    --sans:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --ease:cubic-bezier(.32,.72,0,1);
  }
  @media (prefers-color-scheme:dark){
    :root{
      --bg:#0b0d12; --surface:#14161e; --surface-2:#1a1d27; --ink:#eef0f5; --ink-2:#a3a8b6; --ink-3:#6d7280; --line:#272b36;
      --blue:#8194ff; --blue-ink:#c8d0ff; --blue-bg:#1b2140;
      --heat:#f0855f; --heat-ink:#f6c4ae; --heat-bg:#38200f;
      --rest:#8b91a1; --rest-ink:#c2c6d0; --rest-bg:#20232d;
      --rec:#4cc199; --rec-ink:#bfe8da; --rec-bg:#0f2c23;
      --warn-ink:#e8c979; --warn-bg:#2f2712; --warn-line:#4a3d18;
      --shadow:0 1px 2px rgba(0,0,0,.3),0 6px 20px rgba(0,0,0,.35);
    }
  }
  :root[data-theme="light"]{
    --bg:#f9f9f7; --surface:#ffffff; --surface-2:#efeeea; --ink:#1a1a1c; --ink-2:#5b5c63; --ink-3:#8d8e96; --line:#e6e5e0;
    --blue:#2f49e6; --blue-ink:#1c2ca0; --blue-bg:#e9ecfd;
    --heat:#d0522c; --heat-ink:#8c3418; --heat-bg:#fbeae2;
    --rest:#6f7480; --rest-ink:#43474f; --rest-bg:#edece7;
    --rec:#1f8a68; --rec-ink:#1a5c47; --rec-bg:#e1f2eb;
    --warn-ink:#8a6212; --warn-bg:#f8eecd; --warn-line:#ecd9a3;
    --shadow:0 1px 2px rgba(20,20,30,.05),0 4px 14px rgba(20,20,30,.06);
  }
  :root[data-theme="dark"]{
    --bg:#0b0d12; --surface:#14161e; --surface-2:#1a1d27; --ink:#eef0f5; --ink-2:#a3a8b6; --ink-3:#6d7280; --line:#272b36;
    --blue:#8194ff; --blue-ink:#c8d0ff; --blue-bg:#1b2140;
    --heat:#f0855f; --heat-ink:#f6c4ae; --heat-bg:#38200f;
    --rest:#8b91a1; --rest-ink:#c2c6d0; --rest-bg:#20232d;
    --rec:#4cc199; --rec-ink:#bfe8da; --rec-bg:#0f2c23;
    --warn-ink:#e8c979; --warn-bg:#2f2712; --warn-line:#4a3d18;
    --shadow:0 1px 2px rgba(0,0,0,.3),0 6px 20px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  #bl{position:fixed;top:0;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;overflow:hidden;
    background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.5;-webkit-font-smoothing:antialiased;
    -webkit-text-size-adjust:100%;-webkit-user-select:none;user-select:none}
  #bl button,#bl a{touch-action:manipulation;font-family:inherit}
  #bl .num{font-variant-numeric:tabular-nums}
  #bl svg{display:block}
  #bl .t-strength{--c:var(--blue);--c-ink:var(--blue-ink);--c-bg:var(--blue-bg)}
  #bl .t-cond{--c:var(--heat);--c-ink:var(--heat-ink);--c-bg:var(--heat-bg)}
  #bl .t-rec{--c:var(--rec);--c-ink:var(--rec-ink);--c-bg:var(--rec-bg)}
  #bl .t-rest{--c:var(--rest);--c-ink:var(--rest-ink);--c-bg:var(--rest-bg)}
  #stack{position:absolute;inset:0}
  #bl .scrim{position:absolute;inset:0;background:#000;opacity:0;pointer-events:none;transition:opacity .34s var(--ease)}
  #bl .page{position:absolute;inset:0;display:flex;flex-direction:column;background:var(--bg);
    transition:transform .34s var(--ease);will-change:transform;box-shadow:-1px 0 0 var(--line)}
  #bl .dragging{transition:none!important}
  #bl .edge{position:absolute;left:0;top:0;bottom:0;width:24px;z-index:5;touch-action:none}
  #bl .navbar{flex:0 0 auto;position:relative;z-index:3;display:flex;align-items:center;gap:8px;
    padding:max(11px,env(safe-area-inset-top)) 14px 11px;min-height:52px;border-bottom:1px solid var(--line);
    background:color-mix(in srgb,var(--bg) 82%,transparent);backdrop-filter:saturate(1.7) blur(16px);-webkit-backdrop-filter:saturate(1.7) blur(16px)}
  #bl .sched-nav{border-bottom-color:transparent}
  #bl .sched-nav.solid{border-bottom-color:var(--line)}
  #bl .navtitle-sm{flex:1;text-align:center;font-size:16px;font-weight:600;letter-spacing:-.2px;opacity:0;transition:opacity .2s ease}
  #bl .sched-nav.solid .navtitle-sm{opacity:1}
  #bl .backbtn{border:none;background:none;color:var(--blue);display:flex;align-items:center;gap:1px;cursor:pointer;
    font-size:16px;font-weight:400;padding:6px 8px 6px 0;flex:0 0 auto}
  #bl .backbtn:active{opacity:.4}
  #bl .navtitle{flex:1;text-align:center;font-size:16px;font-weight:600;letter-spacing:-.2px;line-height:1.15;padding-right:52px}
  #bl .navtitle small{display:block;font-size:11.5px;font-weight:400;color:var(--ink-3);margin-top:1px}
  #bl .scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
  #bl .view{padding:6px 18px calc(28px + env(safe-area-inset-bottom))}
  #bl .homehdr{padding:12px 0 12px}
  #bl .apptitle{font-size:34px;font-weight:700;letter-spacing:-1px;margin:0}
  #bl .aboutlink{margin-top:9px;display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);background:var(--surface);
    color:var(--ink-2);border-radius:999px;padding:7px 11px;font-size:13px;font-weight:500;cursor:pointer;box-shadow:var(--shadow)}
  #bl .aboutlink:active{background:var(--surface-2)}
  #bl .aboutlink .ilead{color:var(--blue);display:flex}
  #bl .aboutlink .itrail{color:var(--ink-3);display:flex}
  #bl .weekwrap{display:flex;gap:8px;overflow-x:auto;padding:2px 0 14px;scrollbar-width:none}
  #bl .weekwrap::-webkit-scrollbar{display:none}
  #bl .weekpill{flex:0 0 auto;border:1px solid var(--line);background:var(--surface);color:var(--ink-2);
    border-radius:11px;padding:9px 14px;font-size:13px;font-weight:600;cursor:pointer;text-align:center;line-height:1.2}
  #bl .weekpill small{display:block;font-size:10.5px;font-weight:500;color:var(--ink-3);margin-top:2px}
  #bl .weekpill[aria-selected="true"]{background:var(--ink);color:var(--bg);border-color:var(--ink)}
  #bl .weekpill[aria-selected="true"] small{color:var(--bg);opacity:.7}
  #bl .days{display:flex;flex-direction:column;gap:11px}
  #bl .day{position:relative;display:flex;align-items:center;gap:13px;background:var(--surface);border:1px solid var(--line);
    border-radius:var(--radius);padding:15px 14px 15px 16px;cursor:pointer;box-shadow:var(--shadow);
    text-align:left;width:100%;color:inherit;transition:background .12s}
  #bl .day:active{background:var(--surface-2)}
  #bl .day::before{content:"";position:absolute;left:0;top:12px;bottom:12px;width:4px;border-radius:0 4px 4px 0;background:var(--c,var(--rest))}
  #bl .daydate{flex:0 0 42px;text-align:center}
  #bl .daydate .dow{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--c-ink,var(--ink-2))}
  #bl .daydate .dnum{font-size:22px;font-weight:700;letter-spacing:-.5px;line-height:1.05}
  #bl .daymid{flex:1 1 auto;min-width:0}
  #bl .daytitle{font-size:16px;font-weight:600;letter-spacing:-.2px}
  #bl .daysub{font-size:13px;color:var(--ink-2);margin-top:1px}
  #bl .dayright{flex:0 0 auto;display:flex;flex-direction:column;align-items:flex-end;gap:6px}
  #bl .chev{color:var(--ink-3);display:flex}
  #bl .tag{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;
    padding:4px 8px;border-radius:7px;background:var(--c-bg,var(--rest-bg));color:var(--c-ink,var(--rest-ink));white-space:nowrap}
  #bl .todaychip{font-size:9.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:3px 7px;border-radius:6px;background:var(--ink);color:var(--bg)}
  #bl .day.rest{background:var(--surface-2);box-shadow:none;border-color:transparent}
  #bl .day.rest .daytitle{color:var(--ink-2)}
  #bl .startcard{background:var(--surface);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);margin-bottom:12px;overflow:hidden}
  #bl .srow{display:flex;gap:11px;padding:11px 13px;align-items:center}
  #bl .srow + .srow{border-top:1px solid var(--line)}
  #bl .sicon{flex:0 0 auto;color:var(--c-ink,var(--ink))}
  #bl .slabel{font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-3)}
  #bl .sval{font-size:14.5px;font-weight:600;color:var(--ink);margin-top:1px;line-height:1.3}
  #bl .focus{font-size:14px;color:var(--ink-2);line-height:1.5;margin:2px 2px 16px}
  #bl .reentry,#bl .safety{display:flex;gap:11px;align-items:flex-start;border-radius:12px;padding:12px 13px;margin-bottom:14px}
  #bl .reentry{background:var(--blue-bg)}
  #bl .reentry .ric{flex:0 0 auto;color:var(--blue-ink);margin-top:1px}
  #bl .reentry p{margin:0;font-size:12.5px;color:var(--blue-ink);line-height:1.5}
  #bl .safety{background:var(--warn-bg);border:1px solid var(--warn-line);margin-bottom:20px}
  #bl .safety .shd{flex:0 0 auto;color:var(--warn-ink);margin-top:1px}
  #bl .safety p{margin:0;font-size:12.5px;color:var(--warn-ink);line-height:1.5}
  #bl .reentry b,#bl .safety b{font-weight:700;letter-spacing:.04em;text-transform:uppercase;font-size:11px}
  #bl .sec{margin-bottom:22px}
  #bl .seclabel{display:flex;align-items:center;gap:8px;margin:0 2px 6px}
  #bl .seclabel .sic{color:var(--c-ink,var(--ink))}
  #bl .seclabel b{font-size:12.5px;font-weight:700;letter-spacing:.11em;text-transform:uppercase;color:var(--ink)}
  #bl .secmeta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:0 2px 12px;font-size:12px;color:var(--ink-2);font-weight:500}
  #bl .struct{display:inline-flex;align-items:center;gap:5px;background:var(--c-bg,var(--rest-bg));color:var(--c-ink,var(--rest-ink));
    padding:4px 9px;border-radius:7px;font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
  #bl .ex{display:flex;gap:12px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:14px 15px;margin-bottom:10px;box-shadow:var(--shadow)}
  #bl .slot{flex:0 0 auto;width:36px;height:36px;border-radius:50%;background:var(--c-bg,var(--rest-bg));border:1.5px solid var(--c,var(--rest));
    color:var(--c-ink,var(--ink));font-size:12.5px;font-weight:700;display:flex;align-items:center;justify-content:center}
  #bl .exbody{flex:1 1 auto;min-width:0}
  #bl .exhead{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
  #bl .exname{font-size:15.5px;font-weight:600;letter-spacing:-.2px;line-height:1.25}
  #bl .exrx{flex:0 0 auto;font-size:14px;font-weight:700;color:var(--c-ink,var(--ink));text-align:right;line-height:1.3;max-width:46%}
  #bl .exsetup{display:inline-flex;align-items:center;gap:6px;margin-top:7px;font-size:11.5px;font-weight:600;color:var(--ink-2);
    background:var(--surface-2);border-radius:7px;padding:4px 9px}
  #bl .exsetup .si{color:var(--ink-3);display:flex}
  #bl .exdesc{font-size:13px;color:var(--ink-2);line-height:1.5;margin:8px 0 0}
  #bl .exbtns{display:flex;gap:8px;margin-top:11px;flex-wrap:wrap}
  #bl .btn{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:600;color:var(--ink-2);text-decoration:none;
    border:1px solid var(--line);border-radius:9px;padding:7px 11px;background:var(--surface-2);cursor:pointer}
  #bl .btn:active{opacity:.6}
  #bl .btn .pl{display:inline-flex;align-items:center;justify-content:center;width:17px;height:17px;border-radius:4px;background:#ff0000;color:#fff}
  #bl .btn.on{background:var(--c-bg);color:var(--c-ink);border-color:transparent}
  #bl .swaptag{display:inline-flex;align-items:center;gap:5px;margin-top:8px;font-size:10.5px;font-weight:700;letter-spacing:.04em;
    text-transform:uppercase;background:var(--c-bg);color:var(--c-ink);border-radius:6px;padding:3px 8px}
  #bl .setnote{font-size:12px;color:var(--ink-2);line-height:1.5;margin:9px 0 0}
  #bl .setnote b{color:var(--ink);font-weight:700}
  #bl .chips{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;margin-top:12px}
  #bl .chip{background:var(--c-bg);border-radius:9px;padding:7px 1px;text-align:center}
  #bl .chip .r{font-size:15px;font-weight:700;color:var(--c-ink);line-height:1}
  #bl .chip .wt{font-size:11px;font-weight:700;color:var(--c-ink);margin-top:3px;line-height:1}
  #bl .chip .p{font-size:9px;font-weight:600;color:var(--c-ink);opacity:.62;margin-top:2px}
  #bl .ab h2{font-size:20px;font-weight:700;letter-spacing:-.4px;margin:24px 0 8px}
  #bl .ab h2:first-child{margin-top:6px}
  #bl .ab p{font-size:14px;color:var(--ink-2);line-height:1.6;margin:0 0 12px}
  #bl .ab .lead{font-size:15px;color:var(--ink)}
  #bl .ab b{color:var(--ink);font-weight:600}
  #bl .ab .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px 17px;margin-bottom:14px;box-shadow:var(--shadow)}
  #bl .ab ul{margin:0;padding-left:0;list-style:none;display:flex;flex-direction:column;gap:11px}
  #bl .ab li{font-size:13.5px;color:var(--ink-2);line-height:1.5;padding-left:22px;position:relative}
  #bl .ab li::before{content:"";position:absolute;left:2px;top:7px;width:7px;height:7px;border-radius:50%;background:var(--blue)}
  #bl .ab .rule li::before{background:var(--warn-ink)}
</style>

    <div class="page" id="rootpage"></div>
    <div class="scrim" id="scrim"></div>
  </div>

      if(!detail)return; dragging=true; startX=ev.clientX; W=bl.clientWidth;
      try{edge.setPointerCapture(ev.pointerId);}catch(e){}
      detail.classList.add("dragging"); rootpage.classList.add("dragging"); scrim.classList.add("dragging");
    });
    edge.addEventListener("pointermove",function(ev){ if(dragging&&detail)setProg(ev.clientX-startX); });
    var end=function(ev){
      if(!dragging)return; dragging=false;
      if(detail)detail.classList.remove("dragging");
      rootpage.classList.remove("dragging"); scrim.classList.remove("dragging");
      var dx=ev.clientX-startX;
      if(detail&&dx>W*0.35)closeDetail();
      else if(detail){ detail.style.transform="translateX(0)"; rootpage.style.transform="translateX(-24%)"; scrim.style.opacity=".12"; }
    };
    edge.addEventListener("pointerup",end); edge.addEventListener("pointercancel",end);
  }

  renderRoot();
  setTimeout(function(){
    var rsEl=document.getElementById("rootscroll"); if(savedNav && savedNav.rs && rsEl) rsEl.scrollTop=savedNav.rs;
    if(savedNav && savedNav.v==="day" && savedNav.day!=null && DAYS[savedNav.day]) openDetail("day",savedNav.day,true);
    else if(savedNav && savedNav.v==="about") openDetail("about",null,true);
    if(detail && savedNav && savedNav.ds){ var s=detail.querySelector(".scroll"); if(s)s.scrollTop=savedNav.ds; }
  },40);
  window.addEventListener("pagehide",saveNav);
  document.addEventListener("visibilitychange",function(){ if(document.visibilityState==="hidden")saveNav(); });
})();
</script>

</body>
</html>
